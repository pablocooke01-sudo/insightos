<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InsightOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans','Helvetica Neue',sans-serif;
  font-size:13px;overflow:hidden;
  transition:background .35s,color .35s;
  -webkit-font-smoothing:antialiased;
}

/* ════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════ */
body.dark{
  --bg0:#080D18;   /* deepest — body */
  --bg1:#0C1220;   /* rail, ws */
  --bg2:#111827;   /* cards, surfaces */
  --bg3:#182032;   /* hover, active */
  --bd0:#1A2540;   /* subtle border */
  --bd1:#243050;   /* card border */
  --bd2:#2E3D60;   /* strong border */
  --t1:#EEF2FF;    /* primary text */
  --t2:#8B9AC0;    /* secondary text */
  --t3:#4A587A;    /* muted text */
  --t4:#2E3D60;    /* subtle/placeholder */
  --ac:#5B4FE9;    /* indigo — identity */
  --ac2:#7B6FFF;   /* indigo lighter */
  --go:#00D4AA;    /* cyan — action/success */
  --go2:#00F0C2;   /* cyan bright */
  --am:#F0A500;    /* amber — attention */
  --rd:#E5484D;    /* red — urgency */
  color:var(--t1);
  background:var(--bg0);
}
body.light{
  --bg0:#F0F3FA;
  --bg1:#FFFFFF;
  --bg2:#FFFFFF;
  --bg3:#EEF1FF;
  --bd0:#E2E8F0;
  --bd1:#D1D9E8;
  --bd2:#B8C4D8;
  --t1:#0F172A;
  --t2:#475569;
  --t3:#94A3B8;
  --t4:#CBD5E1;
  --ac:#4B40D4;
  --ac2:#6B5FFF;
  --go:#00A88A;
  --go2:#00C4A0;
  --am:#D97706;
  --rd:#DC2626;
  color:var(--t1);
  background:var(--bg0);
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ── BASE ── */
button{cursor:pointer;font-family:inherit;transition:all .15s}
select{cursor:pointer;font-family:inherit}
select option{background:var(--bg2);color:var(--t1)}
input::placeholder,textarea::placeholder{color:var(--t4)}

/* ── LAYOUT ── */
.root{display:flex;height:100vh;overflow:hidden;position:relative}

/* ── RAIL (left nav) ── */
.rail{
  width:192px;flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid var(--bd0);
  display:flex;flex-direction:column;
  position:relative;
}
.rail::after{
  content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;
  background:linear-gradient(to bottom,var(--ac)00,var(--ac)40,var(--ac)00);
  opacity:.6;
}

/* Brand */
.brand{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--bd0);
  display:flex;align-items:center;gap:11px;
}
.brand-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:grid;place-items:center;
  font-size:15px;color:#fff;flex-shrink:0;
  box-shadow:0 4px 16px var(--ac)50;
}
.brand-name{
  font-size:15px;font-weight:800;color:var(--t1);
  letter-spacing:-.03em;line-height:1;
}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:.08em;margin-top:3px}

/* Streak pill */
.streak{
  display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;
  background:rgba(240,165,0,.12);
  border:1px solid rgba(240,165,0,.25);
  font-size:10px;font-weight:700;color:var(--am);
  margin-left:auto;flex-shrink:0;
}

/* Nav */
.nav-section{padding:10px 8px 0}
.nav-btn{
  display:flex;align-items:center;gap:9px;width:100%;
  padding:8px 10px;border-radius:7px;border:none;
  background:transparent;color:var(--t3);
  font-size:11px;font-weight:600;letter-spacing:.03em;
  text-align:left;
}
.nav-btn:hover{background:var(--bg3);color:var(--t2)}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(91,79,233,.18),rgba(91,79,233,.08));
  color:var(--ac2);
  border:1px solid rgba(91,79,233,.2);
}
.nav-btn .nb-icon{font-size:13px;flex-shrink:0}
.nav-btn .nb-badge{
  margin-left:auto;padding:2px 6px;border-radius:10px;
  background:rgba(59,130,246,.2);color:#60A5FA;
  font-size:8px;font-weight:700;
}

/* Projects list */
.proj-section{flex:1;overflow-y:auto;padding:6px 8px}
.proj-label{
  font-size:8px;font-weight:700;color:var(--t4);
  letter-spacing:.14em;padding:10px 10px 5px;
}
.proj-btn{
  display:flex;align-items:center;gap:9px;width:100%;
  padding:8px 10px;border-radius:7px;border:none;
  border-left:2px solid transparent;
  background:transparent;text-align:left;
  transition:all .15s;
}
.proj-btn:hover{background:var(--bg3)}
.proj-btn.active{
  border-left-color:var(--proj-c,var(--ac));
  background:color-mix(in srgb,var(--proj-c,var(--ac)) 10%,transparent);
}
.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{
  font-size:11px;font-weight:700;color:var(--t2);
  letter-spacing:.04em;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.proj-btn.active .proj-name{color:var(--proj-c,var(--ac))}
.proj-meta{font-size:9px;color:var(--t3);margin-top:2px}
.proj-btn.active .proj-meta{color:var(--t2);opacity:.7}
.proj-badge{
  font-size:8px;font-weight:700;padding:2px 6px;
  border-radius:8px;flex-shrink:0;
  border:1px solid;
}
.add-proj{
  width:100%;padding:7px 10px;
  background:transparent;border:1px dashed var(--bd1);
  border-radius:7px;color:var(--t3);font-size:10px;
  margin-top:6px;
}
.add-proj:hover{border-color:var(--bd2);color:var(--t2)}

/* Rail footer */
.rail-foot{
  padding:8px;border-top:1px solid var(--bd0);
  display:flex;flex-direction:column;gap:3px;
}
.foot-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:7px 10px;border-radius:6px;
  background:transparent;border:1px solid transparent;
  color:var(--t3);font-size:10px;letter-spacing:.03em;
  position:relative;
}
.foot-btn:hover{background:var(--bg3);border-color:var(--bd1);color:var(--t2)}
.foot-btn.capture{
  color:var(--ac2);
  background:rgba(91,79,233,.08);
  border-color:rgba(91,79,233,.2);
}
.foot-btn .fb-right{margin-left:auto;font-size:9px;color:var(--t3)}
.foot-dot{
  position:absolute;top:6px;right:8px;
  width:5px;height:5px;border-radius:50%;
  background:var(--am);
}

/* Theme btn */
.theme-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:6px 10px;border-radius:6px;
  background:transparent;border:1px solid var(--bd0);
  color:var(--t3);font-size:10px;margin-top:3px;
}
.theme-btn:hover{background:var(--bg3);color:var(--t2);border-color:var(--bd1)}

/* ── CENTER ── */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd0)}

.chead{
  padding:14px 18px 12px;
  border-bottom:1px solid var(--bd0);
  background:var(--bg1);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-shrink:0;
}
.chead-title{font-size:19px;font-weight:800;color:var(--t1);letter-spacing:-.04em;line-height:1}
.chead-sub{font-size:11px;color:var(--t2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.chead-stat{display:flex;align-items:center;gap:4px}
.chead-stat span{font-weight:600}

/* Capture btn */
.cap-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  background:rgba(91,79,233,.1);
  border:1px solid rgba(91,79,233,.25);
  color:var(--ac2);font-size:11px;font-weight:600;
  white-space:nowrap;
}
.cap-btn:hover{background:rgba(91,79,233,.18);border-color:rgba(91,79,233,.4)}

/* Filter bar */
.filter-bar{
  padding:8px 14px;border-bottom:1px solid var(--bd0);
  display:flex;gap:5px;flex-wrap:wrap;align-items:center;
  flex-shrink:0;background:var(--bg1);
}
.f-btn{
  padding:4px 10px;border-radius:5px;
  border:1px solid var(--bd1);background:var(--bg2);
  color:var(--t3);font-size:11px;
}
.f-btn:hover{color:var(--t2);border-color:var(--bd2)}
.f-btn.on{
  color:var(--fc,var(--ac));
  border-color:var(--fc,var(--ac));
  background:color-mix(in srgb,var(--fc,var(--ac)) 10%,transparent);
  font-weight:600;
}
.f-div{width:1px;height:16px;background:var(--bd1);margin:0 2px}

/* ── INBOX LIST ── */
.inbox-list{flex:1;overflow-y:auto;padding:8px 12px}

.ins-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:9px;
  border:1px solid var(--bd1);
  background:var(--bg2);
  cursor:pointer;margin-bottom:5px;
  transition:all .18s;
  border-left:3px solid var(--lc,var(--bd1));
  position:relative;
}
.ins-row:hover{background:var(--bg3);border-color:var(--bd2);border-left-color:var(--lc)}
.ins-row.active{
  background:var(--bg3);
  border-color:var(--ac);
  border-left-color:var(--ac);
  box-shadow:0 0 0 1px rgba(91,79,233,.15),0 4px 20px rgba(0,0,0,.15);
}
.ins-row.isnew{
  background:color-mix(in srgb,#3B82F6 4%,var(--bg2));
  border-color:rgba(59,130,246,.25);
}
.ins-row.isnew.active{border-color:var(--ac)}

.ins-urg{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ins-body{flex:1;min-width:0}
.ins-title{
  font-size:12.5px;font-weight:500;color:var(--t2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  letter-spacing:-.01em;margin-bottom:5px;
  display:flex;align-items:center;gap:7px;
}
.ins-row.active .ins-title{color:var(--t1);font-weight:600}
.ins-row.isnew .ins-title{color:var(--t1)}
.ins-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ins-tag{
  font-size:9px;padding:2px 7px;border-radius:4px;
  font-weight:600;letter-spacing:.03em;
}
.ins-sum{
  font-size:10px;color:var(--t3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:220px;
}
.ins-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ins-src{font-size:9px;color:var(--t3)}
.ins-prompt-tag{font-size:9px;color:var(--go);font-weight:700}

/* NEW badge */
.new-badge{
  font-size:7px;font-weight:800;padding:2px 6px;border-radius:3px;
  letter-spacing:.08em;flex-shrink:0;
  background:rgba(59,130,246,.15);color:#60A5FA;
  border:1px solid rgba(59,130,246,.25);
}

/* ── PIPELINE ── */
.pipe-wrap{flex:1;display:flex;overflow:hidden}
.pipe-col{flex:1;border-right:1px solid var(--bd0);display:flex;flex-direction:column;min-width:0}
.pipe-col-head{
  padding:10px 12px 8px;border-bottom:1px solid var(--bd0);
  display:flex;align-items:center;gap:7px;flex-shrink:0;
  background:var(--bg1);
}
.pipe-col-dot{width:6px;height:6px;border-radius:50%}
.pipe-col-label{font-size:9px;font-weight:700;letter-spacing:.1em;flex:1}
.pipe-col-count{font-size:10px;color:var(--t3)}
.pipe-col-cards{flex:1;overflow-y:auto;padding:6px}
.pipe-empty{
  height:48px;border:1px dashed var(--bd0);
  border-radius:6px;display:grid;place-items:center;
  color:var(--t4);font-size:10px;
}
.pcard{
  position:relative;padding:10px 10px 10px 12px;
  border-radius:7px;border:1px solid var(--bd1);
  background:var(--bg2);cursor:pointer;
  margin-bottom:5px;transition:all .2s;overflow:hidden;
}
.pcard:hover{background:var(--bg3);border-color:var(--bd2)}
.pcard.active{
  background:var(--bg3);
  box-shadow:0 0 0 1px rgba(91,79,233,.25),0 2px 12px rgba(0,0,0,.12);
}
.pcard-urg{position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:3px 0 0 3px}
.pcard-title{
  font-size:12px;font-weight:500;color:var(--t2);
  line-height:1.45;margin-bottom:5px;letter-spacing:-.01em;
}
.pcard.active .pcard-title{font-weight:600;color:var(--t1)}
.pcard-sum{font-size:9.5px;color:var(--t3);line-height:1.4;margin-bottom:5px}
.pcard-foot{display:flex;align-items:center;gap:5px}
.pcard-urg-label{font-size:8px;font-weight:600}
.pcard-prompt{font-size:8px;color:var(--go);font-weight:700;margin-left:auto}
.pcard-actions{
  margin-top:8px;padding-top:7px;border-top:1px solid var(--bd0);
  display:flex;gap:4px;flex-wrap:wrap;
}
.pcard-action{
  font-size:8px;padding:2px 7px;border-radius:3px;
  border:1px solid;background:transparent;
  cursor:pointer;font-family:inherit;
}
.pcard-del{
  margin-left:auto;font-size:9px;padding:2px 5px;
  border:1px solid var(--bd1);border-radius:3px;
  background:transparent;color:var(--t3);cursor:pointer;font-family:inherit;
}

/* ── VAULT ── */
.vault-wrap{flex:1;overflow-y:auto;padding:24px}
.vault-title{font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.04em;margin-bottom:4px}
.vault-sub{font-size:12px;color:var(--t3);margin-bottom:24px}
.streak-hero{
  padding:20px 22px;border-radius:12px;
  background:linear-gradient(135deg,rgba(240,165,0,.1),rgba(240,165,0,.04));
  border:1px solid rgba(240,165,0,.2);
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
}
.streak-fire{font-size:40px;line-height:1}
.streak-count{font-size:28px;font-weight:800;color:var(--am);letter-spacing:-.04em;line-height:1}
.streak-label{font-size:11px;color:var(--t2);margin-top:3px}
.streak-msg{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.5}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.metric-card{
  padding:18px 16px;border-radius:10px;
  border:1px solid var(--bd1);background:var(--bg2);
  text-align:center;
}
.metric-icon{font-size:12px;color:var(--t3);margin-bottom:8px}
.metric-val{font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:4px}
.metric-lbl{font-size:10px;color:var(--t3);line-height:1.4}
.proj-progress-lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;margin-bottom:10px}
.proj-bar-card{
  padding:14px 16px;border-radius:9px;
  border:1px solid var(--bd1);background:var(--bg2);
  margin-bottom:8px;display:flex;align-items:center;gap:14px;
}
.proj-bar-info{flex:1;min-width:0}
.proj-bar-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px}
.proj-bar-track{height:4px;background:var(--bd1);border-radius:2px;overflow:hidden}
.proj-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.proj-bar-pct{font-size:13px;font-weight:800;letter-spacing:-.03em;min-width:34px;text-align:right}
.vault-since{font-size:10px;color:var(--t4);text-align:center;margin-top:20px}

/* ── WORKSPACE ── */
.ws{width:292px;flex-shrink:0;background:var(--bg1);display:flex;flex-direction:column;border-left:1px solid var(--bd0)}
.ws-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px}
.ws-empty-icon{font-size:28px;opacity:.06;margin-bottom:10px}
.ws-empty-txt{font-size:12px;color:var(--t3);text-align:center;line-height:1.9;max-width:190px}
.ws-queue-lbl{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.12em;margin:20px 0 8px;width:100%}
.ws-queue-item{
  width:100%;padding:10px 12px;border-radius:7px;
  border:1px solid var(--bd1);background:var(--bg2);
  margin-bottom:5px;cursor:pointer;text-align:left;
  transition:all .15s;
}
.ws-queue-item:hover{background:var(--bg3);border-color:var(--bd2)}
.ws-queue-title{font-size:11px;color:var(--t2);line-height:1.4;margin-bottom:3px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-queue-proj{font-size:9px;font-weight:600}

.ws-head{padding:14px 14px 12px;border-bottom:1px solid var(--bd0);flex-shrink:0}
.ws-ins-title{
  font-size:13px;font-weight:700;color:var(--t1);
  line-height:1.45;margin-bottom:9px;letter-spacing:-.01em;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.ws-controls{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.mode-badge{
  font-size:9px;padding:3px 9px;border-radius:5px;
  border:1px solid;font-weight:600;letter-spacing:.04em;
}
.mode-auto{background:rgba(0,212,170,.08);border-color:rgba(0,212,170,.25);color:var(--go)}
.mode-consult{background:rgba(240,165,0,.08);border-color:rgba(240,165,0,.25);color:var(--am)}
.ws-sel{
  font-size:9px;border-radius:4px;padding:3px 6px;
  border:1px solid var(--bd1);background:var(--bg2);
  color:var(--t2);outline:none;
}
.ws-copy-btn{
  font-size:9px;padding:3px 9px;border-radius:4px;
  border:1px solid rgba(0,212,170,.3);
  background:rgba(0,212,170,.08);color:var(--go);
  font-weight:600;
}
.ws-copy-btn:hover{background:rgba(0,212,170,.15)}
.ws-redo-btn{
  font-size:9px;padding:3px 9px;border-radius:4px;
  border:1px solid var(--bd1);background:transparent;color:var(--t3);
}
.ws-redo-btn:hover{background:var(--bg3);color:var(--t2)}

/* Steps */
.steps{
  display:flex;align-items:center;gap:4px;
  padding:8px 14px;border-bottom:1px solid var(--bd0);
  flex-shrink:0;background:var(--bg1);
}
.step-dot{
  width:15px;height:15px;border-radius:50%;
  border:1px solid var(--bd2);background:transparent;
  display:grid;place-items:center;font-size:7px;
  color:var(--t3);flex-shrink:0;transition:all .35s;
}
.step-dot.done{background:var(--go);border-color:var(--go);color:#fff;box-shadow:0 0 8px rgba(0,212,170,.4)}
.step-lbl{font-size:8px;color:var(--t3);white-space:nowrap;letter-spacing:.04em}
.step-lbl.done{color:var(--go)}
.step-line{flex:1;height:1px;background:var(--bd0);min-width:3px}
.step-line.done{background:rgba(0,212,170,.3)}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:14px 12px 8px;background:var(--bg0)}
.msg-wrap{display:flex;gap:8px;margin-bottom:14px}
.msg-wrap.user{justify-content:flex-end}
.ai-avatar{
  width:22px;height:22px;border-radius:5px;flex-shrink:0;margin-top:2px;
  background:rgba(91,79,233,.15);border:1px solid rgba(91,79,233,.3);
  display:grid;place-items:center;font-size:7px;color:var(--ac2);font-weight:800;
}
.msg-bubble{
  max-width:85%;padding:10px 14px;font-size:12px;line-height:1.75;border:1px solid;
}
.msg-bubble.ai{
  background:var(--bg2);border-color:var(--bd1);color:var(--t2);
  border-radius:3px 10px 10px 10px;
}
.msg-bubble.user{
  background:rgba(91,79,233,.14);border-color:rgba(91,79,233,.3);color:#C4BCFF;
  border-radius:10px 10px 3px 10px;
}
.msg-bubble .h2{font-size:12px;font-weight:700;color:var(--t1);margin:12px 0 5px;letter-spacing:-.01em}
.msg-bubble .h3{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:9px 0 3px}
.msg-bubble .pb{

async function sbUpdateInsight(id, fields){
  const map={};
  if(fields.status!==undefined)   map.status=fields.status;
  if(fields.reviewed!==undefined) map.reviewed=fields.reviewed;
  if(fields.category!==undefined) map.category=fields.category;
  if(fields.urgency!==undefined)  map.urgency=fields.urgency;
  if(fields.prompt!==undefined)   map.prompt=fields.prompt;
  if(fields.summary!==undefined)  map.summary=fields.summary;
  if(fields.chat!==undefined)     map.chat=fields.chat;
  if(Object.keys(map).length===0) return;
  await sb.from('insights').update(map).eq('id',id);
}

async function streamAI(messages,systemPrompt,onChunk){
  const visible=messages.filter(m=>!m._s);
  const contents=visible.map(m=>({
    role:m.role==='assistant'?'model':'user',
    parts:[{text:m.content}]
  }));
  if(contents.length===0){
    contents.push({role:'user',parts:[{text:systemPrompt}]});
  } else if(contents[0].role==='user'){
    contents[0].parts[0].text=systemPrompt+String.fromCharCode(10)+contents[0].parts[0].text;
  } else {
    contents.unshift({role:'user',parts:[{text:systemPrompt}]});
  }
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':streamGenerateContent?alt=sse&key='+GEMINI_API_KEY;
  const res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents,generationConfig:{temperature:0.7,maxOutputTokens:2000}})
  });
  if(!res.ok){const e=await res.text();throw new Error('Gemini error: '+e)}
  const reader=res.body.getReader();const dec=new TextDecoder();let full='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split('\n')){
      if(!line.startsWith('data: '))continue;
      try{
        const j=JSON.parse(line.slice(6));
        const t=j.candidates?.[0]?.content?.parts?.[0]?.text;
        if(t){full+=t;onChunk(full)}
      }catch{}
    }
  }
  return full;
}

// ── STREAK ENGINE ────────────────────────────────────────────────
function updateStreak(db){
  const t=today();
  const s=db.streak||{count:0,lastDate:null};
  if(s.lastDate===t)return db; // already captured today
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.toISOString().split("T")[0];
  const newCount=s.lastDate===yStr?s.count+1:1;
  return{...db,streak:{count:newCount,lastDate:t}};
}

      ?`Analise este insight no modo consulta:\n\nProjeto: ${p.name} (${p.description})\nStatus: ${PS[p.status]?.label}\nOutros insights ativos: ${others}\n\nINSIGHT: "${ins.title}"\nFonte: ${ins.source==='whatsapp'?'WhatsApp':'Manual'}\nCategoria: ${ins.category} | Urgência: ${ins.urgency}`
      :`Analise automaticamente — entregue classificação, análise, 3 caminhos, recomendação e prompt de uma vez:\n\nProjeto: ${p.name} — ${p.description}\nStatus: ${PS[p.status]?.label}\nOutros insights ativos: ${others}\nPrompts recentes: ${recentPrompts}\n\nINSIGHT: "${ins.title}"\nFonte: ${ins.source==='whatsapp'?'WhatsApp (áudio em movimento)':'Manual'}\nCategoria: ${ins.category} | Urgência: ${ins.urgency}\n\nInfira o que não está explícito. Entregue análise completa + prompt gerado.`;
    setChat([]);setBusy(true);setBuf('');
    streamAI([{role:'user',content:ctxMsg}],sysPrompt,t=>setBuf(t))
      .then(full=>{
        const msgs=[{role:'user',content:ctxMsg,_s:true},{role:'assistant',content:full,_s:false}];
        setChat(msgs);setBuf('');
        const sum=xSum(full);const ep=xP(full);
        upI(pId,ins.id,{status:ep?'ready':'processing',chat:msgs,summary:sum,reviewed:true,...(ep?{prompt:ep}:{})});
        if(ep){libSave(ep,ins.title,p.name);toast_('✦ Análise completa + prompt gerado!')}
        else toast_('Análise concluída');
      })
      .catch(()=>setChat([{role:'assistant',content:'Erro de conexão. Tente novamente.',_s:false}]))
      .finally(()=>{setBusy(false);setBuf('')});
  }

  async function send(){
    if(!inp.trim()||busy||!insight)return;
    const text=inp.trim();setInp('');
    const msgs=[...chat,{role:'user',content:text,_s:false}];
    setChat(msgs);setBusy(true);setBuf('');
    const sp=autoMode?SYSTEM_AUTO:SYSTEM_CONSULT;
    try{
      const full=await streamAI(msgs.map(m=>({role:m.role,content:m.content})),sp,t=>setBuf(t));
      const fin=[...msgs,{role:'assistant',content:full,_s:false}];
      setChat(fin);setBuf('');upI(insight.pId,insight.id,{chat:fin,summary:xSum(full)});
      const ep=xP(full);
      if(ep){upI(insight.pId,insight.id,{prompt:ep,status:'ready'});libSave(ep,insight.title,iProj.name);toast_('✦ Prompt salvo!')}
    }catch{setChat(p=>[...p,{role:'assistant',content:'Erro de conexão.',_s:false}])}
    finally{setBusy(false);setBuf('')}
  }

  // ── CALENDAR HELPERS ──────────────────────────────────────────────────────
  function calDays(month){
    const year=month.getFullYear(),m=month.getMonth();
    const first=new Date(year,m,1).getDay();
    const days=new Date(year,m+1,0).getDate();
    const cells=[];
    for(let i=0;i<first;i++) cells.push({d:null,other:true});
    for(let d=1;d<=days;d++) cells.push({d,date:new Date(year,m,d),other:false});
    return cells;
  }

  function hasMeeting(date){
    if(!date)return false;
    return meetings.some(m=>{
      const md=new Date(m.scheduled_at);
      return md.getFullYear()===date.getFullYear()&&md.getMonth()===date.getMonth()&&md.getDate()===date.getDate();
    });
  }

  function meetingsForMonth(){
    return meetings.filter(m=>{
      const md=new Date(m.scheduled_at);
      return md.getFullYear()===calMonth.getFullYear()&&md.getMonth()===calMonth.getMonth();
    }).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
  }

  function formatMeetingTime(iso){
    const d=new Date(iso);
    return d.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }

  function isMeetingActive(m){
    const now=new Date();
    const mt=new Date(m.scheduled_at);
    const diff=(mt-now)/60000; // minutes
    return diff<=30&&diff>-m.duration_min;
  }

      )
    ),

        // ══ PANELS ════════════════════════════════════════════════════════════════
    pan&&e('div',{className:'ov-bg',onClick:ev=>{if(ev.target===ev.currentTarget)setPan(null)}},
      e('div',{className:'ov-box',style:{width:pan==='cap'?'400px':'460px'}},
        e('button',{className:'ov-close',onClick:()=>setPan(null)},'×'),
        e(PanelContent)
      )
    )
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InsightOS));

</script>
</body>
</html>
